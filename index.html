<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOOBA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-screen">
        <h1>GLOOBA</h1>
    </div>
    <div id="welcome-screen" class="hidden">
        <h1>Welcome to GLOOBA</h1>
        <div class="auth-buttons">
            <button id="login-btn" class="btn btn-primary">Log In</button>
            <button id="signup-btn" class="btn btn-secondary">Create Account</button>
        </div>
    </div>

    <div id="signup-options-screen" class="hidden">
        <h2>Join GLOOBA</h2>
        <div class="auth-buttons">
            <button class="btn btn-primary">📱 Sign up with Phone</button>
            <button id="signup-email-btn" class="btn btn-secondary">📧 Sign up with Email</button>
        </div>
        <button id="back-to-welcome-btn" class="btn-link">Back</button>
    </div>

    <div id="signup-email-form-screen" class="hidden">
        <h2>Create your account</h2>
        <form id="signup-form">
            <div class="form-group">
                <input type="text" id="fullname" name="fullname" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <input type="text" id="username" name="username" placeholder="Username (@handle)" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full-width">Continue</button>
        </form>
        <button id="back-to-options-btn" class="btn-link">Back</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
